<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopkar AKM - Sistem MOM</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (Pengganti Lucide untuk versi HTML) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Untuk compile JSX di browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style type="text/tailwindcss">
        @media print {
            body { background-color: white !important; }
            .print\:hidden { display: none !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:pt-0 { padding-top: 0 !important; }
            .print\:max-w-none { max-width: none !important; }
            .break-inside-avoid { break-inside: avoid; }
            .break-before-page { break-before: page; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- KONFIGURASI ICON (Menerjemahkan Lucide ke FontAwesome) ---
        const IconMap = {
            Printer: "fas fa-print", Plus: "fas fa-plus", Trash2: "fas fa-trash-alt",
            Camera: "fas fa-camera", UserPlus: "fas fa-user-plus", LayoutDashboard: "fas fa-th-large",
            FileText: "fas fa-file-alt", CheckCircle: "fas fa-check-circle", Clock: "fas fa-clock",
            AlertCircle: "fas fa-exclamation-circle", Save: "fas fa-save", Edit: "fas fa-edit",
            LinkIcon: "fas fa-link", X: "fas fa-times", AlertTriangle: "fas fa-exclamation-triangle",
            Calendar: "fas fa-calendar-alt", Upload: "fas fa-upload", RefreshCw: "fas fa-sync-alt",
            Copy: "fas fa-copy", Eye: "fas fa-eye", Download: "fas fa-download", Filter: "fas fa-filter",
            PenTool: "fas fa-pen-nib", MessageCircle: "fab fa-whatsapp"
        };

        const IconComponent = (name) => ({ size = 16, className = '' }) => (
            <i className={`${IconMap[name]} ${className}`} style={{ fontSize: size }}></i>
        );

        const Printer = IconComponent('Printer'); const Plus = IconComponent('Plus');
        const Trash2 = IconComponent('Trash2'); const Camera = IconComponent('Camera');
        const UserPlus = IconComponent('UserPlus'); const LayoutDashboard = IconComponent('LayoutDashboard');
        const FileText = IconComponent('FileText'); const CheckCircle = IconComponent('CheckCircle');
        const Clock = IconComponent('Clock'); const AlertCircle = IconComponent('AlertCircle');
        const Save = IconComponent('Save'); const Edit = IconComponent('Edit');
        const LinkIcon = IconComponent('LinkIcon'); const X = IconComponent('X');
        const AlertTriangle = IconComponent('AlertTriangle'); const Calendar = IconComponent('Calendar');
        const Upload = IconComponent('Upload'); const RefreshCw = IconComponent('RefreshCw');
        const Copy = IconComponent('Copy'); const Eye = IconComponent('Eye');
        const Download = IconComponent('Download'); const Filter = IconComponent('Filter');
        const PenTool = IconComponent('PenTool'); const MessageCircle = IconComponent('MessageCircle');

        // --- URL DATABASE & ANGGOTA TIM ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxM0ftIZ9aKkCOu_19OgD1ZxJtmDw434moCfkubMgud_ihedxfRpncPFzodkH0aIYO6ww/exec";

        const TEAM_MEMBERS = [
            { name: 'Ageng Prasongko', role: 'Ketua Koperasi', phone: '6285248995995' },
            { name: 'Alhamdi Rasyid', role: 'Sekretaris Koperasi', phone: '6285349972513' },
            { name: 'Aan Nurhadi', role: 'Bendahara Koperasi', phone: '6281348726354' },
            { name: 'Kadarisman', role: 'Ketua Pengawas', phone: '628115001445' },
            { name: 'Yudi Arfian', role: 'Anggota Pengawas', phone: '6285213978077' },
            { name: 'Ufik Mahdi', role: 'Anggota Pengawas', phone: '6285386429150' },
            { name: 'Fedrik Christian Adi Candra', role: 'Manager Koperasi', phone: '62811501144' },
            { name: 'Mahmudah Hayati', role: 'Kabag Administrasi', phone: '628125171659' },
            { name: 'Ernest Kalula', role: 'Operasional', phone: '6281318039691' },
            { name: 'Sri Mulyani', role: 'Unit Simpan Pinjam', phone: '6281346538675' },
            { name: 'Zahrah Annisa', role: 'Pembiayaan Wisata', phone: '6285248626532' },
            { name: 'Rika Norhidayah', role: 'Administrasi', phone: '6287877965036' }
        ];

        function App() {
            const [moms, setMoms] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isLoading, setIsLoading] = useState(true);

            const [selectedPicFilter, setSelectedPicFilter] = useState('All');

            const [currentMomId, setCurrentMomId] = useState('');
            const [meetingInfo, setMeetingInfo] = useState({
                date: '', time: '', location: '', agenda: '', preparedBy: '', signature: ''
            });
            const [attendees, setAttendees] = useState([{ id: Date.now(), name: '' }]);
            const [actions, setActions] = useState([]);
            const [docs, setDocs] = useState([]);

            const [isFollowUpModalOpen, setIsFollowUpModalOpen] = useState(false);
            const [selectedAction, setSelectedAction] = useState(null);
            const [selectedMomId, setSelectedMomId] = useState(null);

            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            const fetchMoms = async () => {
                setIsLoading(true);
                try {
                    const response = await fetch(GAS_URL);
                    const result = await response.json();
                    if (result.status === 'success') {
                        const fetchedMoms = result.data;
                        fetchedMoms.sort((a, b) => new Date(b.meetingInfo.date) - new Date(a.meetingInfo.date));
                        setMoms(fetchedMoms);
                    }
                } catch (error) {
                    console.error("Error fetching data:", error);
                    alert("Gagal menarik data. Cek koneksi internet Anda.");
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => { fetchMoms(); }, []);

            const handleCarryOverMom = (mom) => {
                const unfinishedTasks = (mom.actions || []).filter(a => a.status !== '3');
                setCurrentMomId(Date.now().toString());
                setMeetingInfo({ 
                    ...mom.meetingInfo, 
                    date: '', time: '', 
                    agenda: `Review / Lanjutan: ${mom.meetingInfo.agenda}`,
                    signature: '' 
                });
                setActions(unfinishedTasks);
                setDocs([]);
                setAttendees([{ id: Date.now(), name: '' }]);
                setActiveTab('form');
            };

            const startDrawing = (e) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.beginPath();
                ctx.moveTo(x, y);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.lineTo(x, y);
                ctx.stroke();
            };

            const stopDrawing = () => {
                setIsDrawing(false);
                const canvas = canvasRef.current;
                if (canvas) {
                    setMeetingInfo({ ...meetingInfo, signature: canvas.toDataURL('image/png') });
                }
            };

            const clearSignature = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                setMeetingInfo({ ...meetingInfo, signature: '' });
            };

            const saveMom = async () => {
                if (!meetingInfo.agenda || !meetingInfo.date) {
                    alert("Agenda dan Tanggal wajib diisi.");
                    return;
                }
                try {
                    const momData = {
                        id: currentMomId || Date.now().toString(),
                        meetingInfo, attendees, actions, docs,
                        updatedAt: new Date().toISOString()
                    };
                    
                    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'save', mom: momData }) });
                    alert("MOM berhasil disimpan ke Google Sheets.");
                    resetForm();
                    fetchMoms();
                    setActiveTab('dashboard');
                } catch (error) {
                    console.error("Error saving:", error);
                    alert("Gagal menyimpan MOM.");
                }
            };

            const deleteMom = async (id) => {
                if (confirm("Hapus MOM ini selamanya dari database?")) {
                    try {
                        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
                        fetchMoms();
                    } catch (error) { console.error("Error deleting:", error); }
                }
            };

            const saveFollowUp = async () => {
                if (!selectedMomId || !selectedAction) return;
                const parentMom = moms.find(m => m.id === selectedMomId);
                if (!parentMom) return;
                const updatedActions = parentMom.actions.map(a => a.id === selectedAction.id ? selectedAction : a);
                const updatedMomData = { ...parentMom, actions: updatedActions, updatedAt: new Date().toISOString() };

                try {
                    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'save', mom: updatedMomData }) });
                    setIsFollowUpModalOpen(false);
                    fetchMoms();
                } catch (error) {
                    console.error("Error follow up:", error);
                    alert("Gagal mengupdate status.");
                }
            };

            const formatTanggalMembaca = (tgl) => {
                if (!tgl) return '-';
                const d = new Date(tgl);
                if (isNaN(d.getTime())) return tgl; // Kembalikan string asli jika formatnya bukan tanggal (contoh: "ASAP")
                return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
            };

            const exportToCSV = (tasksToExport) => {
                const headers = ['Agenda', 'Tanggal', 'Topik', 'PIC', 'Batas Waktu', 'Status', 'Catatan Bukti'];
                const rows = tasksToExport.map(t => [
                    `"${t.momAgenda || ''}"`,
                    t.momDate || '',
                    `"${t.topic || ''}"`,
                    t.pic || '',
                    `"${formatTanggalMembaca(t.deadline)}"`,
                    t.status === '1' ? 'Belum' : t.status === '2' ? 'Progress' : 'Selesai',
                    `"${t.proofNote || ''}"`
                ]);
                const csvContent = "data:text/csv;charset=utf-8," + [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "Rekap_Tugas_MOM.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const sendWhatsApp = (task) => {
                const picName = task.pic || '';
                const member = TEAM_MEMBERS.find(m => m.name.toLowerCase() === picName.toLowerCase().trim());
                
                const text = `Halo ${task.pic}, sekadar mengingatkan terkait tugas MOM: \n\nAgenda: *${task.momAgenda}*\nTopik: *${task.topic}*\nBatas Waktu: *${formatTanggalMembaca(task.deadline)}*\n\nMohon segera di-update progressnya. Terima kasih.`;
                
                let waUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
                if (member && member.phone) {
                    waUrl = `https://api.whatsapp.com/send?phone=${member.phone}&text=${encodeURIComponent(text)}`;
                }
                
                window.open(waUrl, '_blank');
            };

            const resetForm = () => {
                setCurrentMomId('');
                setMeetingInfo({ date: '', time: '', location: '', agenda: '', preparedBy: '', signature: '' });
                setAttendees([{ id: Date.now(), name: '' }]);
                setActions([]); setDocs([]);
            };

            const createNewMom = () => { resetForm(); setCurrentMomId(Date.now().toString()); setActiveTab('form'); };
            const loadMomForEdit = (mom) => { setCurrentMomId(mom.id); setMeetingInfo(mom.meetingInfo || {}); setAttendees(mom.attendees || []); setActions(mom.actions || []); setDocs(mom.docs || []); setActiveTab('form'); };
            const loadMomForPreview = (mom) => { setCurrentMomId(mom.id); setMeetingInfo(mom.meetingInfo || {}); setAttendees(mom.attendees || []); setActions(mom.actions || []); setDocs(mom.docs || []); setActiveTab('preview'); };
            const handleInfoChange = (e) => setMeetingInfo({ ...meetingInfo, [e.target.name]: e.target.value });
            const addAttendee = () => setAttendees([...attendees, { id: Date.now(), name: '' }]);
            const updateAttendee = (id, name) => setAttendees(attendees.map(a => a.id === id ? { ...a, name } : a));
            const removeAttendee = (id) => setAttendees(attendees.filter(a => a.id !== id));
            const addAction = () => setActions([...actions, { id: Date.now(), topic: '', deadline: '', pic: '', status: '1', proofLink: '', proofNote: '' }]);
            const updateAction = (id, field, value) => setActions(actions.map(a => a.id === id ? { ...a, [field]: value } : a));
            const removeAction = (id) => setActions(actions.filter(a => a.id !== id));
            
            const handleImageUpload = (e, targetSetter, isModal = false) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new window.Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scaleSize = 600 / img.width;
                        canvas.width = 600; canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.6); 
                        if (isModal) targetSetter({...selectedAction, proofImageBase64: dataUrl});
                        else setDocs([...docs, { id: Date.now(), url: dataUrl, description: '' }]);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };
            const removeDoc = (id) => setDocs(docs.filter(d => d.id !== id));
            const updateDocDesc = (id, desc) => setDocs(docs.map(d => d.id === id ? { ...d, description: desc } : d));
            const printDocument = () => window.print();

            let allTasks = [];
            moms.forEach(mom => {
                if (mom.actions) {
                    mom.actions.forEach(action => {
                        allTasks.push({ ...action, momId: mom.id, momDate: mom.meetingInfo?.date, momAgenda: mom.meetingInfo?.agenda });
                    });
                }
            });

            allTasks.sort((a, b) => parseInt(a.status) - parseInt(b.status));
            const uniquePICs = [...new Set(allTasks.map(t => t.pic).filter(Boolean).map(p => p.trim()))].sort();
            const displayedTasks = selectedPicFilter === 'All' ? allTasks : allTasks.filter(t => t.pic?.trim() === selectedPicFilter);

            const totalTasks = displayedTasks.length;
            const closedTasks = displayedTasks.filter(t => t.status === '3').length;

            const checkDueDateRisk = (deadline, status) => {
                if (status === '3') return { label: 'Selesai', color: 'text-green-600', bg: 'bg-green-50' };
                if (!deadline) return { label: 'Aman', color: 'text-gray-600', bg: 'bg-gray-50' };
                
                const dlLower = deadline.toLowerCase();
                if (dlLower.includes('asap') || dlLower.includes('segera')) return { label: 'ASAP', color: 'text-red-700', bg: 'bg-red-50' };
                
                // Pengecekan cerdas berbasis tanggal aktual (Format YYYY-MM-DD)
                const dueDate = new Date(deadline);
                if (!isNaN(dueDate.getTime())) {
                    const today = new Date();
                    today.setHours(0, 0, 0, 0); // Nol-kan jam agar adil hitung selisih harinya
                    
                    const diffTime = dueDate.getTime() - today.getTime();
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                    if (diffDays < 0) return { label: 'Overdue', color: 'text-red-700', bg: 'bg-red-50' };
                    if (diffDays <= 3) return { label: 'Mendekati', color: 'text-yellow-700', bg: 'bg-yellow-50' };
                    return { label: 'Aman', color: 'text-gray-600', bg: 'bg-gray-50' };
                }

                // Fallback untuk data lama yang hanya berisi kata bulan (contoh "Maret")
                const currentMonthNum = new Date().getMonth() + 1;
                const months = ["januari", "februari", "maret", "april", "mei", "juni", "juli", "agustus", "september", "oktober", "november", "desember"];
                const deadlineMonthIndex = months.findIndex(m => dlLower.includes(m));
                if (deadlineMonthIndex !== -1 && deadlineMonthIndex < currentMonthNum - 1) return { label: 'Overdue', color: 'text-red-700', bg: 'bg-red-50' };
                
                return { label: 'Mendekati', color: 'text-yellow-700', bg: 'bg-yellow-50' };
            };

            const urgentTasks = displayedTasks.filter(t => t.status !== '3' && checkDueDateRisk(t.deadline, t.status).label !== 'Aman' && checkDueDateRisk(t.deadline, t.status).label !== 'Mendekati');

            const ytdSummary = moms.map(mom => {
                const momTasks = mom.actions || [];
                const totalMomTasks = momTasks.length;
                const followedUpTasks = momTasks.filter(t => t.status === '2' || t.status === '3').length;
                const overdueTasks = momTasks.filter(t => t.status === '1' && (checkDueDateRisk(t.deadline, t.status).label === 'Overdue' || checkDueDateRisk(t.deadline, t.status).label === 'ASAP')).length;

                let monthStr = '-';
                if (mom.meetingInfo?.date) {
                    const d = new Date(mom.meetingInfo.date);
                    if (!isNaN(d.getTime())) monthStr = d.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
                }

                return {
                    id: mom.id, agenda: mom.meetingInfo?.agenda, date: mom.meetingInfo?.date, month: monthStr,
                    location: mom.meetingInfo?.location, attendeesCount: (mom.attendees || []).length,
                    totalMomTasks, followedUpTasks, overdueTasks
                };
            });

            const draggingTasks = allTasks.filter(t => t.status === '1' && (checkDueDateRisk(t.deadline, t.status).label === 'Overdue' || checkDueDateRisk(t.deadline, t.status).label === 'ASAP'));

            if (isLoading) return <div className="min-h-screen flex items-center justify-center font-bold text-blue-600 text-xl flex-col gap-4"><RefreshCw className="animate-spin" size={32}/> Sinkronisasi Data...</div>;

            return (
                <div className="min-h-screen bg-gray-50 font-sans text-gray-800">
                    
                    <datalist id="team-list">
                        {TEAM_MEMBERS.map((member, idx) => (
                        <option key={idx} value={member.name}>{member.role}</option>
                        ))}
                    </datalist>

                    <nav className="bg-white border-b shadow-sm print:hidden sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between h-16">
                            <div className="flex items-center gap-2">
                            <div className="bg-blue-600 text-white p-2 rounded-lg"><FileText size={20} /></div>
                            <span className="font-bold text-lg tracking-tight">Kopkar AKM - Sistem MOM</span>
                            </div>
                            <div className="flex items-center space-x-4">
                            <button onClick={fetchMoms} className="px-3 py-2 text-gray-400 hover:text-blue-600 transition-colors"><RefreshCw size={18} /></button>
                            <button onClick={() => setActiveTab('dashboard')} className={`px-3 py-2 rounded-md text-sm font-bold transition-colors ${activeTab === 'dashboard' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}`}>Dashboard</button>
                            <button onClick={createNewMom} className={`px-3 py-2 rounded-md text-sm font-bold transition-colors ${activeTab === 'form' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}`}><span className="flex items-center gap-1"><Plus size={16}/> Buat Baru</span></button>
                            </div>
                        </div>
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto p-4 sm:p-8">
                        
                        {activeTab === 'dashboard' && (
                        <div className="space-y-6 print:hidden">
                            <div className="flex justify-between items-end border-b pb-4 flex-wrap gap-4">
                            <div>
                                <h1 className="text-2xl font-bold text-gray-900">Executive Summary</h1>
                                <p className="text-gray-500 text-sm mt-1">Pantau performa PIC dan progres tindak lanjut.</p>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex items-center bg-white border border-gray-300 rounded px-3 py-2 shadow-sm">
                                <Filter size={16} className="text-gray-400 mr-2" />
                                <select 
                                    value={selectedPicFilter} 
                                    onChange={(e) => setSelectedPicFilter(e.target.value)}
                                    className="bg-transparent border-none outline-none text-sm font-bold text-gray-700"
                                >
                                    <option value="All">Semua PIC</option>
                                    {uniquePICs.map((pic, i) => <option key={i} value={pic}>{pic}</option>)}
                                </select>
                                </div>
                                <button onClick={() => exportToCSV(displayedTasks)} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm font-bold flex items-center gap-2 shadow-sm">
                                <Download size={16} /> Export CSV
                                </button>
                            </div>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div className="bg-white p-4 rounded border-l-4 border-l-blue-500 shadow-sm"><p className="text-xs text-gray-500 font-bold uppercase">Total Tugas</p><p className="text-2xl font-bold text-blue-600">{totalTasks}</p></div>
                            <div className="bg-white p-4 rounded border-l-4 border-l-green-500 shadow-sm"><p className="text-xs text-gray-500 font-bold uppercase">Selesai</p><p className="text-2xl font-bold text-green-600">{closedTasks}</p></div>
                            <div className="bg-white p-4 rounded border-l-4 border-l-yellow-500 shadow-sm"><p className="text-xs text-gray-500 font-bold uppercase">Progress</p><p className="text-2xl font-bold text-yellow-600">{displayedTasks.filter(t => t.status === '2').length}</p></div>
                            <div className="bg-white p-4 rounded border-l-4 border-l-red-500 shadow-sm"><p className="text-xs text-gray-500 font-bold uppercase">Overdue / ASAP</p><p className="text-2xl font-bold text-red-600">{urgentTasks.length}</p></div>
                            </div>

                            <div className="bg-white rounded shadow-sm border overflow-hidden mt-8">
                            <div className="p-5 border-b bg-gray-50 font-bold text-lg flex items-center gap-2">
                                <LayoutDashboard size={20}/> Year to Date (YTD) & Insight Bersama
                            </div>
                            <div className="p-5">
                                {draggingTasks.length > 0 && (
                                <div className="mb-6 bg-red-50 border-l-4 border-red-600 p-4 rounded shadow-sm">
                                    <h3 className="font-bold text-red-800 mb-2 flex items-center gap-2"><AlertTriangle size={18}/> Perhatian: Tugas Berlarut-larut (Belum Follow Up)</h3>
                                    <ul className="list-disc pl-5 space-y-2 text-sm text-red-900">
                                    {draggingTasks.map((t, idx) => (
                                        <li key={idx} className="flex items-center flex-wrap gap-2">
                                        <span>MOM <b>{t.momDate}</b>: "{t.topic}" <span className="font-bold">(PIC: {t.pic})</span></span>
                                        <button onClick={() => sendWhatsApp(t)} className="text-blue-700 font-bold text-xs bg-blue-100 hover:bg-blue-200 px-2 py-1 rounded transition-colors flex items-center gap-1">
                                            Ingatkan PIC via WA
                                        </button>
                                        </li>
                                    ))}
                                    </ul>
                                </div>
                                )}
                                
                                <div className="overflow-x-auto">

                                <table className="w-full mb-8 text-sm">
                                    <tbody>
                                    <tr><td className="w-32 py-1 font-bold">Agenda</td><td className="w-4">:</td><td className="uppercase">{meetingInfo.agenda}</td></tr>
                                    <tr><td className="py-1 font-bold">Hari / Tanggal</td><td>:</td><td>{meetingInfo.date}</td></tr>
                                    <tr><td className="py-1 font-bold">Waktu</td><td>:</td><td>{meetingInfo.time}</td></tr>
                                    <tr><td className="py-1 font-bold align-top">Tempat</td><td className="align-top">:</td><td>{meetingInfo.location}</td></tr>
                                    </tbody>
                                </table>

                                <div className="grid grid-cols-2 gap-8">
                                    {docs.map((doc, i) => (
                                    <div key={doc.id} className="border-2 border-gray-300 p-2 text-center break-inside-avoid shadow-sm bg-white">
                                        <img src={doc.url} alt={`Dokumentasi ${i+1}`} className="w-full h-64 object-cover mb-3 rounded-sm border border-gray-200" />
                                        <p className="text-sm font-bold uppercase border-t pt-2 text-gray-800">{doc.description || `FOTO KEGIATAN ${i+1}`}</p>
                                    </div>
                                    ))}
                                </div>
                                </div>
                            )}
                            </div>
                        </div>
                        )}
                    </div>

                    {isFollowUpModalOpen && selectedAction && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 print:hidden">
                        <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
                            <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                            <h3 className="font-bold text-lg">Update Progress</h3>
                            <button onClick={() => setIsFollowUpModalOpen(false)} className="text-gray-500 hover:bg-gray-200 p-1 rounded"><X size={20}/></button>
                            </div>
                            <div className="p-6 space-y-5">
                            <div className="bg-blue-50 p-3 rounded text-sm text-blue-900 border border-blue-100">
                                <span className="font-bold block mb-1">Topik:</span>{selectedAction.topic}
                            </div>
                            <div>
                                <label className="block text-sm font-bold mb-2">1. Ubah Status</label>
                                <div className="grid grid-cols-3 gap-2">
                                <button onClick={() => setSelectedAction({...selectedAction, status: '1'})} className={`py-2 rounded text-xs font-bold border ${selectedAction.status === '1' ? 'bg-red-100 border-red-500 text-red-700' : 'bg-white text-gray-500'}`}>Belum</button>
                                <button onClick={() => setSelectedAction({...selectedAction, status: '2'})} className={`py-2 rounded text-xs font-bold border ${selectedAction.status === '2' ? 'bg-yellow-100 border-yellow-500 text-yellow-700' : 'bg-white text-gray-500'}`}>Progress</button>
                                <button onClick={() => setSelectedAction({...selectedAction, status: '3'})} className={`py-2 rounded text-xs font-bold border ${selectedAction.status === '3' ? 'bg-green-100 border-green-500 text-green-700' : 'bg-white text-gray-500'}`}>Selesai</button>
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-bold mb-1">2. Catatan Singkat / Bukti</label>
                                <textarea 
                                value={selectedAction.proofNote || ''} 
                                onChange={(e) => setSelectedAction({...selectedAction, proofNote: e.target.value})}
                                className="w-full border rounded p-2 text-sm h-20"
                                />
                            </div>
                            <button onClick={saveFollowUp} className="w-full bg-blue-600 text-white font-bold py-3 rounded flex items-center justify-center gap-2"><Save size={18} />Simpan</button>
                            </div>
                        </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
