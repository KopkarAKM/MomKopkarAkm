<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopkar AKM - Sistem MOM Terpadu</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style type="text/tailwindcss">
        @media print {
            body { background-color: white !important; }
            .print\:hidden { display: none !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:pt-0 { padding-top: 0 !important; }
            .print\:max-w-none { max-width: none !important; }
            .break-inside-avoid { break-inside: avoid; }
            .break-before-page { break-before: page; }
            .print-exact { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Hide scrollbar for nav */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- KONFIGURASI ICON ---
        const IconMap = {
            Printer: "fas fa-print", Plus: "fas fa-plus", Trash2: "fas fa-trash-alt", Camera: "fas fa-camera", 
            UserPlus: "fas fa-user-plus", LayoutDashboard: "fas fa-th-large", FileText: "fas fa-file-alt", 
            CheckCircle: "fas fa-check-circle", Clock: "fas fa-clock", AlertCircle: "fas fa-exclamation-circle", 
            Save: "fas fa-save", Edit: "fas fa-edit", LinkIcon: "fas fa-link", X: "fas fa-times", 
            AlertTriangle: "fas fa-exclamation-triangle", Calendar: "fas fa-calendar-alt", Upload: "fas fa-upload", 
            RefreshCw: "fas fa-sync-alt", Copy: "fas fa-copy", Eye: "fas fa-eye", Download: "fas fa-download", 
            Filter: "fas fa-filter", MessageCircle: "fab fa-whatsapp", Lock: "fas fa-lock", Unlock: "fas fa-unlock-alt",
            Search: "fas fa-search", ChartBar: "fas fa-chart-bar", History: "fas fa-history", User: "fas fa-user",
            Broadcast: "fas fa-bullhorn", CalendarDay: "fas fa-calendar-day", Check: "fas fa-check"
        };

        const IconComponent = (name) => ({ size = 16, className = '' }) => (
            <i className={`${IconMap[name]} ${className}`} style={{ fontSize: size }}></i>
        );

        const Icons = Object.keys(IconMap).reduce((acc, key) => {
            acc[key] = IconComponent(key);
            return acc;
        }, {});

        // --- URL DATABASE BARU ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz4Z4cZxWkFbB_lZrCBiV6COK94plER9Cc0cf1kjtoiPNkat360OwDENNDwyG3oEy2oOw/exec";

        const TEAM_MEMBERS = [
            { name: 'Ageng Prasongko', role: 'Ketua Koperasi', phone: '6285248995995' },
            { name: 'Alhamdi Rasyid', role: 'Sekretaris Koperasi', phone: '6285349972513' },
            { name: 'Aan Nurhadi', role: 'Bendahara Koperasi', phone: '6281348726354' },
            { name: 'Kadarisman', role: 'Ketua Pengawas', phone: '628115001445' },
            { name: 'Yudi Arfian', role: 'Anggota Pengawas', phone: '6285213978077' },
            { name: 'Ufik Mahdi', role: 'Anggota Pengawas', phone: '6285386429150' },
            { name: 'Fedrik Christian Adi Candra', role: 'Manager Koperasi', phone: '62811501144' },
            { name: 'Mahmudah Hayati', role: 'Kabag Administrasi', phone: '628125171659' },
            { name: 'Ernest Kalula', role: 'Operasional', phone: '6281318039691' },
            { name: 'Sri Mulyani', role: 'Unit Simpan Pinjam', phone: '6281346538675' },
            { name: 'Zahrah Annisa', role: 'Pembiayaan Wisata', phone: '6285248626532' },
            { name: 'Rika Norhidayah', role: 'Administrasi', phone: '6287877965036' }
        ];

        function App() {
            // --- STATE UTAMA ---
            const [moms, setMoms] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isLoading, setIsLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedPicFilter, setSelectedPicFilter] = useState('All');

            // --- STATE AUTH / ROLE ---
            const [currentUser, setCurrentUser] = useState(null);
            const [loginModalOpen, setLoginModalOpen] = useState(false);
            const [loginInput, setLoginInput] = useState('');

            // --- STATE FORM ---
            const [currentMomId, setCurrentMomId] = useState('');
            const [meetingInfo, setMeetingInfo] = useState({ date: '', time: '', location: '', agenda: '', preparedBy: '' });
            const [attendees, setAttendees] = useState([{ id: Date.now(), name: '' }]);
            const [actions, setActions] = useState([]);
            const [docs, setDocs] = useState([]);

            // --- STATE MODALS & UPLOAD ---
            const [isFollowUpModalOpen, setIsFollowUpModalOpen] = useState(false);
            const [selectedAction, setSelectedAction] = useState(null);
            const [selectedMomId, setSelectedMomId] = useState(null);
            const [broadcastModalOpen, setBroadcastModalOpen] = useState(false);
            const [isFileUploading, setIsFileUploading] = useState(false);

            // --- FETCH DATA ---
            const fetchMoms = async () => {
                setIsLoading(true);
                try {
                    const response = await fetch(GAS_URL);
                    const result = await response.json();
                    if (result.status === 'success') {
                        const fetchedMoms = result.data;
                        fetchedMoms.sort((a, b) => new Date(b.meetingInfo.date) - new Date(a.meetingInfo.date));
                        setMoms(fetchedMoms);
                    }
                } catch (error) {
                    console.error("Error fetching data:", error);
                    alert("Gagal menarik data. Cek koneksi internet Anda.");
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => { fetchMoms(); }, []);

            // --- AUTH LOGIC ---
            const handleLogin = () => {
                const input = loginInput.trim();
                if (input === 'AKM2026') setCurrentUser({ role: 'superadmin', name: 'Super Admin' });
                else if (input === 'SEKRETARIS') setCurrentUser({ role: 'sekretaris', name: 'Sekretaris' });
                else if (input === 'PENGAWAS') setCurrentUser({ role: 'pengawas', name: 'Pengawas' });
                else {
                    const member = TEAM_MEMBERS.find(m => m.phone === input || m.name.toLowerCase() === input.toLowerCase());
                    if (member) setCurrentUser({ role: 'pengurus', name: member.name });
                    else { alert("PIN / Nomor WA tidak terdaftar!"); return; }
                }
                setLoginModalOpen(false);
                setLoginInput('');
            };

            const handleLogout = () => {
                setCurrentUser(null);
                if (activeTab === 'form') setActiveTab('dashboard');
            };

            const canEditMOM = currentUser?.role === 'superadmin' || currentUser?.role === 'sekretaris';
            const canDeleteMOM = currentUser?.role === 'superadmin';
            const canViewScorecard = currentUser?.role === 'superadmin' || currentUser?.role === 'pengawas';
            const canUpdateTask = (taskPic) => {
                if (canEditMOM) return true;
                if (currentUser?.role === 'pengurus' && currentUser.name.toLowerCase() === (taskPic || '').toLowerCase().trim()) return true;
                return false;
            };

            // --- OPERASI DATABASE ---
            const handleCarryOverMom = (mom) => {
                const unfinishedTasks = (mom.actions || []).filter(a => a.status !== '3').map((a, idx) => {
                    let newTopic = a.topic || '';
                    if ((a.status == '1') && !newTopic.includes('[Bahan PICA]')) {
                        const prevDate = mom.meetingInfo?.date ? `(${mom.meetingInfo.date})` : '';
                        newTopic = `${newTopic}\n\n[Bahan PICA]: Tugas MOM ${prevDate} belum dieksekusi. Evaluasi kendala & solusi.`.trim();
                    }
                    return { ...a, id: Date.now() + idx, topic: newTopic, history: [] };
                });
                
                setCurrentMomId(Date.now().toString());
                setMeetingInfo({ ...mom.meetingInfo, date: '', time: '', agenda: `Review: ${mom.meetingInfo.agenda}` });
                setActions(unfinishedTasks);
                setDocs([]);
                setAttendees([{ id: Date.now(), name: '' }]);
                setActiveTab('form');
            };

            const saveMom = async () => {
                if (!meetingInfo.agenda || !meetingInfo.date) return alert("Agenda dan Tanggal wajib diisi.");
                try {
                    const momData = {
                        id: currentMomId || Date.now().toString(),
                        meetingInfo, attendees, actions, docs,
                        updatedAt: new Date().toISOString()
                    };
                    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'save', mom: momData }) });
                    resetForm(); fetchMoms(); setActiveTab('dashboard');
                } catch (error) { alert("Gagal menyimpan MOM."); }
            };

            const deleteMom = async (id) => {
                if (confirm("Hapus MOM ini selamanya?")) {
                    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
                    fetchMoms();
                }
            };

            const saveFollowUp = async () => {
                if (!selectedMomId || !selectedAction) return;
                const parentMom = moms.find(m => m.id === selectedMomId);
                if (!parentMom) return;
                
                const oldAction = parentMom.actions.find(a => a.id === selectedAction.id);
                let newHistory = selectedAction.history || [];
                
                if (oldAction.status !== selectedAction.status || oldAction.proofNote !== selectedAction.proofNote || oldAction.proofFileUrl !== selectedAction.proofFileUrl) {
                    newHistory.unshift({
                        date: new Date().toISOString(),
                        user: currentUser?.name || 'Unknown',
                        oldStatus: oldAction.status,
                        newStatus: selectedAction.status,
                        note: selectedAction.proofNote || 'Update progress'
                    });
                }

                const finalAction = { ...selectedAction, history: newHistory };
                const updatedActions = parentMom.actions.map(a => a.id === finalAction.id ? finalAction : a);
                const updatedMomData = { ...parentMom, actions: updatedActions, updatedAt: new Date().toISOString() };

                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'save', mom: updatedMomData }) });
                setIsFollowUpModalOpen(false); fetchMoms();
            };

            // --- UPLOAD FILE KE GOOGLE DRIVE ---
            const handleFileUploadToDrive = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsFileUploading(true);
                const reader = new FileReader();
                
                reader.onload = async (event) => {
                    const base64Data = event.target.result.split(',')[1];
                    
                    try {
                        const response = await fetch(GAS_URL, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: 'uploadFile',
                                filename: file.name,
                                mimeType: file.type || 'application/octet-stream',
                                data: base64Data
                            })
                        });
                        const result = await response.json();
                        
                        if (result.status === 'success') {
                            setSelectedAction({
                                ...selectedAction, 
                                proofFileUrl: result.url, 
                                proofFileName: file.name,
                                proofImageBase64: null
                            });
                        } else {
                            alert("Gagal upload file: " + result.message);
                        }
                    } catch (error) {
                        console.error("Upload error:", error);
                        alert("Terjadi kesalahan koneksi saat mengunggah.");
                    } finally {
                        setIsFileUploading(false);
                    }
                };
                reader.readAsDataURL(file);
            };

            // --- HELPER FUNCTIONS ---
            const formatTanggalMembaca = (tgl) => {
                if (!tgl) return '-'; const d = new Date(tgl);
                return isNaN(d.getTime()) ? tgl : d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
            };

            const formatToGCalDate = (tgl) => {
                const d = new Date(tgl);
                if (isNaN(d.getTime())) return '';
                return d.toISOString().replace(/-|:|\.\d\d\d/g, "");
            };

            const addToGCal = (task) => {
                const dateStr = formatToGCalDate(task.deadline);
                if (!dateStr) return alert("Format tanggal tidak valid untuk Google Calendar (Gunakan YYYY-MM-DD)");
                const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(task.topic)}&dates=${dateStr}/${dateStr}&details=${encodeURIComponent('PIC: ' + task.pic + '\nAgenda: ' + task.momAgenda)}`;
                window.open(url, '_blank');
            };

            const sendWhatsApp = (task) => {
                const member = TEAM_MEMBERS.find(m => m.name.toLowerCase() === (task.pic||'').toLowerCase().trim());
                const text = `Halo ${task.pic}, sekadar mengingatkan tugas MOM: \n\nAgenda: *${task.momAgenda}*\nTopik: *${task.topic}*\nBatas Waktu: *${formatTanggalMembaca(task.deadline)}*\n\nMohon segera di-update. Terima kasih.`;
                window.open(`https://api.whatsapp.com/send?${member?.phone ? `phone=${member.phone}&` : ''}text=${encodeURIComponent(text)}`, '_blank');
            };

            const exportToCSV = (tasksToExport) => {
                const headers = ['Agenda', 'Tanggal', 'Topik', 'PIC', 'Batas Waktu', 'Status', 'Catatan / Link Bukti'];
                const rows = tasksToExport.map(t => [
                    `"${t.momAgenda || ''}"`,
                    t.momDate || '',
                    `"${t.topic || ''}"`,
                    t.pic || '',
                    `"${formatTanggalMembaca(t.deadline)}"`,
                    t.status === '1' ? 'Belum' : t.status === '2' ? 'Progress' : 'Selesai',
                    `"${t.proofFileUrl || t.proofNote || ''}"`
                ]);
                const csvContent = "data:text/csv;charset=utf-8," + [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "Rekap_Tugas_MOM.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // --- FORM HANDLERS ---
            const resetForm = () => {
                setCurrentMomId(''); setMeetingInfo({ date: '', time: '', location: '', agenda: '', preparedBy: '' });
                setAttendees([{ id: Date.now(), name: '' }]); setActions([]); setDocs([]);
            };
            const createNewMom = () => { resetForm(); setCurrentMomId(Date.now().toString()); setActiveTab('form'); };
            const loadMomForEdit = (mom) => { setCurrentMomId(mom.id); setMeetingInfo(mom.meetingInfo || {}); setAttendees(mom.attendees || []); setActions(mom.actions || []); setDocs(mom.docs || []); setActiveTab('form'); };
            const loadMomForPreview = (mom) => { setCurrentMomId(mom.id); setMeetingInfo(mom.meetingInfo || {}); setAttendees(mom.attendees || []); setActions(mom.actions || []); setDocs(mom.docs || []); setActiveTab('preview'); };
            
            const handleInfoChange = (e) => setMeetingInfo({ ...meetingInfo, [e.target.name]: e.target.value });
            const addAttendee = () => setAttendees([...attendees, { id: Date.now(), name: '' }]);
            const updateAttendee = (id, name) => setAttendees(attendees.map(a => a.id === id ? { ...a, name } : a));
            const removeAttendee = (id) => setAttendees(attendees.filter(a => a.id !== id));
            
            const addAction = () => setActions([...actions, { id: Date.now(), topic: '', deadline: '', pic: '', status: '1', history: [] }]);
            const updateAction = (id, field, value) => setActions(actions.map(a => a.id === id ? { ...a, [field]: value } : a));
            const removeAction = (id) => setActions(actions.filter(a => a.id !== id));

            const handleImageUpload = (e, targetSetter, isModal = false) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new window.Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = 600 / img.width; canvas.width = 600; canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.6); 
                        if (isModal) targetSetter({...selectedAction, proofImageBase64: dataUrl});
                        else setDocs([...docs, { id: Date.now(), url: dataUrl, description: '' }]);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };
            const removeDoc = (id) => setDocs(docs.filter(d => d.id !== id));
            const updateDocDesc = (id, desc) => setDocs(docs.map(d => d.id === id ? { ...d, description: desc } : d));
            const printDocument = () => window.print();

            // --- DATA PROCESSING ---
            let allTasks = [];
            moms.forEach(mom => mom.actions?.forEach(action => allTasks.push({ ...action, momId: mom.id, momDate: mom.meetingInfo?.date, momAgenda: mom.meetingInfo?.agenda })));
            allTasks.sort((a, b) => parseInt(a.status) - parseInt(b.status));

            const uniquePICs = [...new Set(allTasks.map(t => t.pic).filter(Boolean).map(p => p.trim()))].sort();
            
            // Terapkan Filter Role, Search, dan PIC
            let displayedTasks = allTasks;
            if (currentUser?.role === 'pengurus') displayedTasks = displayedTasks.filter(t => t.pic?.toLowerCase().trim() === currentUser.name.toLowerCase().trim());
            if (selectedPicFilter !== 'All') displayedTasks = displayedTasks.filter(t => t.pic?.trim() === selectedPicFilter);
            if (searchTerm) {
                const s = searchTerm.toLowerCase();
                displayedTasks = displayedTasks.filter(t => (t.topic||'').toLowerCase().includes(s) || (t.pic||'').toLowerCase().includes(s) || (t.momAgenda||'').toLowerCase().includes(s));
            }

            const checkDueDateRisk = (deadline, status) => {
                if (status === '3') return { label: 'Selesai', color: 'text-green-600', bg: 'bg-green-50', border: 'border-green-200' };
                if (!deadline) return { label: 'Aman', color: 'text-gray-600', bg: 'bg-gray-50', border: 'border-gray-200' };
                const dlLower = deadline.toLowerCase();
                if (dlLower.includes('asap') || dlLower.includes('segera')) return { label: 'ASAP', color: 'text-red-700', bg: 'bg-red-50', border: 'border-red-200' };
                
                const dueDate = new Date(deadline);
                if (!isNaN(dueDate.getTime())) {
                    const diffDays = Math.ceil((dueDate.getTime() - new Date().setHours(0,0,0,0)) / 86400000);
                    if (diffDays < 0) return { label: 'Overdue', color: 'text-red-700', bg: 'bg-red-50', border: 'border-red-200' };
                    if (diffDays <= 3) return { label: 'Mendekati', color: 'text-yellow-700', bg: 'bg-yellow-50', border: 'border-yellow-200' };
                    return { label: 'Aman', color: 'text-gray-600', bg: 'bg-gray-50', border: 'border-gray-200' };
                }
                const currentMonthNum = new Date().getMonth() + 1;
                const months = ["januari", "februari", "maret", "april", "mei", "juni", "juli", "agustus", "september", "oktober", "november", "desember"];
                const deadlineMonthIndex = months.findIndex(m => dlLower.includes(m));
                if (deadlineMonthIndex !== -1 && deadlineMonthIndex < currentMonthNum - 1) return { label: 'Overdue', color: 'text-red-700', bg: 'bg-red-50', border: 'border-red-200' };
                return { label: 'Mendekati', color: 'text-yellow-700', bg: 'bg-yellow-50', border: 'border-yellow-200' };
            };

            const overdueTasks = displayedTasks.filter(t => t.status !== '3' && (checkDueDateRisk(t.deadline, t.status).label === 'Overdue' || checkDueDateRisk(t.deadline, t.status).label === 'ASAP'));
            const allOverdueGrouped = Object.entries(
                allTasks.filter(t => t.status !== '3' && ['Overdue', 'ASAP'].includes(checkDueDateRisk(t.deadline, t.status).label))
                .reduce((acc, t) => { acc[t.pic || 'Tanpa Nama'] = [...(acc[t.pic || 'Tanpa Nama'] || []), t]; return acc; }, {})
            );

            const picPerformance = uniquePICs.map(pic => {
                const pT = allTasks.filter(t => t.pic === pic);
                const done = pT.filter(t => t.status === '3').length;
                return { pic, total: pT.length, done, percent: pT.length === 0 ? 0 : Math.round((done/pT.length)*100) };
            }).sort((a,b) => b.percent - a.percent);

            const ytdSummary = moms.map(mom => {
                const momTasks = mom.actions || [];
                const totalMomTasks = momTasks.length;
                const followedUpTasks = momTasks.filter(t => t.status === '2' || t.status === '3').length;
                const overdueTasks = momTasks.filter(t => t.status === '1' && (checkDueDateRisk(t.deadline, t.status).label === 'Overdue' || checkDueDateRisk(t.deadline, t.status).label === 'ASAP')).length;

                let monthStr = '-';
                if (mom.meetingInfo?.date) {
                    const d = new Date(mom.meetingInfo.date);
                    if (!isNaN(d.getTime())) monthStr = d.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
                }

                return {
                    id: mom.id, agenda: mom.meetingInfo?.agenda, date: mom.meetingInfo?.date, month: monthStr,
                    location: mom.meetingInfo?.location, attendeesCount: (mom.attendees || []).length,
                    totalMomTasks, followedUpTasks, overdueTasks
                };
            });

            const draggingTasks = allTasks.filter(t => t.status === '1' && (checkDueDateRisk(t.deadline, t.status).label === 'Overdue' || checkDueDateRisk(t.deadline, t.status).label === 'ASAP'));

            if (isLoading) return <div className="min-h-screen flex items-center justify-center font-bold text-blue-600 text-xl"><Icons.RefreshCw className="animate-spin mr-2" size={24}/> Memuat Sistem...</div>;

            return (
                <div className="min-h-screen bg-gray-50 font-sans text-gray-800 pb-20">
                    <datalist id="team-list">{TEAM_MEMBERS.map((m, i) => <option key={i} value={m.name}>{m.role}</option>)}</datalist>

                    {/* ==================================================== 
                        NAVIGASI (MOBILE OPTIMIZED)
                    ==================================================== */}
                    <nav className="bg-white border-b shadow-sm print:hidden sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center gap-2 shrink-0">
                                    <div className="bg-blue-600 text-white p-2 rounded-lg flex items-center justify-center"><Icons.FileText size={18} /></div>
                                    <span className="font-bold text-lg hidden md:block">Kopkar AKM</span>
                                </div>
                                <div className="flex items-center gap-2 overflow-x-auto no-scrollbar w-full md:w-auto justify-start md:justify-end pl-2 py-1">
                                    <button onClick={fetchMoms} className="p-2 text-gray-500 bg-gray-100 rounded-full hover:bg-blue-100 hover:text-blue-600 shrink-0" title="Refresh Data"><Icons.RefreshCw size={16} /></button>
                                    
                                    <button onClick={() => setActiveTab('dashboard')} className={`px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-colors ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>Dashboard</button>
                                    <button onClick={() => setActiveTab('calendar')} className={`px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-colors ${activeTab === 'calendar' ? 'bg-blue-600 text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>Kalender</button>

                                                        <td className="border border-black py-2 px-2 text-center align-top">{i + 1}</td>
                                                        <td className="border border-black py-2 px-2 align-top whitespace-pre-wrap">{a.topic}</td>
                                                        <td className="border border-black py-2 px-2 text-center align-top">{formatTanggalMembaca(a.deadline)}</td>
                                                        <td className="border border-black py-2 px-2 text-center align-top">{a.pic}</td>
                                                        <td className="border border-black py-2 px-2 text-center align-top font-bold">{a.status === '1' ? 'Belum' : a.status === '2' ? 'Progress' : 'Selesai'}</td>
                                                    </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    <div className="mt-12 sm:mt-16 flex justify-end break-inside-avoid">
                                        <div className="text-center text-xs sm:text-sm"><p>Dibuat Oleh,</p><div className="h-20 sm:h-24"></div><p className="font-bold underline">{meetingInfo.preparedBy}</p></div>
                                    </div>
                                </div>

                                {/* Hal 2: ABSENSI */}
                                <div className="min-h-[297mm] break-before-page pt-10 print:pt-0">
                                    <div className="flex flex-col sm:flex-row items-center border-b-4 border-double border-black pb-4 mb-6 text-center sm:text-left gap-4 sm:gap-0">
                                        <img src="https://i.ibb.co.com/WvTwLMn5/image-1.png" alt="Logo" className="w-20 h-20 sm:w-24 sm:h-24 object-contain print-exact" />
                                        <div className="flex-1 sm:px-4 text-center">
                                            <h1 className="text-lg sm:text-xl font-bold uppercase text-blue-900 print-exact">Koperasi Karyawan Adaro Karya Mandiri</h1>
                                            <p className="text-xs sm:text-sm font-bold mt-1">Badan Hukum Nomor : 2128/BH/IX Tanggal 31 Juli 1995</p>
                                        </div>
                                        <div className="w-24 hidden sm:block"></div> 
                                    </div>
                                    <h2 className="text-center text-base sm:text-lg font-bold underline mb-6 uppercase tracking-widest">DAFTAR HADIR</h2>
                                    <table className="w-full mb-6 text-xs sm:text-sm">
                                        <tbody>
                                            <tr><td className="w-24 sm:w-32 py-1 font-bold align-top">Agenda</td><td className="w-4 align-top">:</td><td className="uppercase">{meetingInfo.agenda}</td></tr>
                                            <tr><td className="py-1 font-bold align-top">Tanggal</td><td className="align-top">:</td><td>{meetingInfo.date}</td></tr>
                                            <tr><td className="py-1 font-bold align-top">Waktu</td><td className="align-top">:</td><td>{meetingInfo.time}</td></tr>
                                            <tr><td className="py-1 font-bold align-top">Tempat</td><td className="align-top">:</td><td>{meetingInfo.location}</td></tr>
                                        </tbody>
                                    </table>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-xs sm:text-sm border-collapse border border-black mt-4 sm:mt-8 min-w-[500px]">
                                            <thead className="bg-gray-100 text-center print-exact">
                                                <tr><th className="border border-black py-3 px-2 w-10">No</th><th className="border border-black py-3 px-2 w-1/3">Nama</th><th className="border border-black py-3 px-2 w-1/3">Jabatan</th><th className="border border-black py-3 px-2 w-1/4">Tanda Tangan</th></tr>
                                            </thead>
                                            <tbody>
                                                {attendees.map((a, i) => {
                                                    const role = TEAM_MEMBERS.find(m => m.name.toLowerCase() === (a.name || '').toLowerCase().trim())?.role || '';
                                                    return (
                                                    <tr key={a.id}>
                                                        <td className="border border-black py-4 px-2 text-center align-middle font-bold">{i + 1}</td>
                                                        <td className="border border-black py-4 px-2 align-middle font-bold uppercase">{a.name}</td>
                                                        <td className="border border-black py-4 px-2 align-middle uppercase text-gray-700">{role}</td>
                                                        <td className="border border-black py-4 px-2 relative h-12 sm:h-16"><span className={`absolute top-2 text-[10px] sm:text-xs font-bold text-gray-400 ${i % 2 === 0 ? 'left-2' : 'left-1/2'}`}>{i + 1}.</span></td>
                                                    </tr>
                                                )})}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* Hal 3: DOKUMENTASI */}
                                {docs.length > 0 && (
                                <div className="min-h-[297mm] break-before-page pt-10 print:pt-0">
                                    <div className="flex flex-col sm:flex-row items-center border-b-4 border-double border-black pb-4 mb-6 text-center sm:text-left gap-4 sm:gap-0">
                                        <img src="https://i.ibb.co.com/WvTwLMn5/image-1.png" alt="Logo" className="w-20 h-20 sm:w-24 sm:h-24 object-contain print-exact" />
                                        <div className="flex-1 sm:px-4 text-center">
                                            <h1 className="text-lg sm:text-xl font-bold uppercase text-blue-900 print-exact">Koperasi Karyawan Adaro Karya Mandiri</h1>
                                        </div>
                                        <div className="w-24 hidden sm:block"></div> 
                                    </div>
                                    <h2 className="text-center text-base sm:text-lg font-bold underline mb-6 uppercase tracking-widest">DOKUMENTASI RAPAT</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 sm:gap-8 mt-6 sm:mt-10">
                                        {docs.map((doc, i) => (
                                        <div key={doc.id} className="border-2 border-gray-300 p-2 text-center break-inside-avoid shadow-sm bg-white">
                                            <img src={doc.url} alt={`Dokumentasi ${i+1}`} className="w-full h-48 sm:h-64 object-cover mb-3 rounded-sm border border-gray-200" />
                                            <p className="text-xs sm:text-sm font-bold uppercase border-t pt-2 text-gray-800">{doc.description || `FOTO KEGIATAN ${i+1}`}</p>
                                        </div>
                                        ))}
                                    </div>
                                </div>
                                )}
                            </div>
                        </div>
                        )}
                    </div>

                    {/* ==================================================== 
                        MODALS (Login, Update, Broadcast)
                    ==================================================== */}
                    
                    {/* Login Modal */}
                    {loginModalOpen && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 print:hidden backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all border border-gray-200">
                                <div className="p-5 border-b bg-gray-50 flex justify-between items-center">
                                    <h3 className="font-bold text-lg flex items-center gap-2 text-gray-800"><Icons.User /> Otorisasi Sistem</h3>
                                    <button onClick={() => setLoginModalOpen(false)} className="text-gray-400 hover:text-red-500 transition-colors bg-gray-100 hover:bg-red-50 p-1.5 rounded-lg"><Icons.X size={18}/></button>
                                </div>
                                <div className="p-6">
                                    <label className="block text-sm font-bold text-gray-700 mb-2">PIN / Nomor WA Login</label>
                                    <input type="password" value={loginInput} onChange={e => setLoginInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin()} className="w-full border-2 border-gray-300 rounded-xl p-4 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 outline-none text-center text-xl tracking-widest transition-all" placeholder="••••••••" autoFocus/>
                                    <button onClick={handleLogin} className="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 mt-6 shadow-md transition-colors text-lg flex items-center justify-center gap-2"><Icons.Unlock size={18}/> Buka Akses</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Broadcast Modal */}
                    {broadcastModalOpen && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 print:hidden backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden max-h-[90vh] flex flex-col border border-gray-200">
                                <div className="p-5 border-b bg-gray-50 flex justify-between items-center">
                                    <h3 className="font-bold text-lg text-green-700 flex items-center gap-2"><Icons.Broadcast /> Broadcast WhatsApp</h3>
                                    <button onClick={() => setBroadcastModalOpen(false)} className="text-gray-400 hover:text-red-500 transition-colors bg-gray-100 hover:bg-red-50 p-1.5 rounded-lg"><Icons.X size={18}/></button>
                                </div>
                                <div className="p-6 overflow-y-auto custom-scrollbar">
                                    <div className="bg-blue-50 border border-blue-200 p-4 rounded-xl mb-5">
                                        <p className="text-sm text-blue-800 leading-relaxed">Sistem mendeteksi <b>{overdueTasks.length} tugas</b> yang berstatus overdue atau ASAP. Sistem telah merangkum tugas tersebut berdasarkan nama PIC. Silakan tekan tombol WA satu per satu secara berurutan.</p>
                                    </div>
                                    <div className="space-y-3">
                                        {allOverdueGrouped.map(([picName, tasks]) => {
                                            const member = TEAM_MEMBERS.find(m => m.name.toLowerCase() === picName.toLowerCase().trim());
                                            const text = `*PENGINGAT OTOMATIS KOPKAR AKM*\nHalo ${picName}, Anda memiliki ${tasks.length} tugas MOM yang belum selesai/overdue:\n\n` + tasks.map((t,i) => `${i+1}. ${t.topic} (MOM: ${t.momAgenda})`).join('\n') + `\n\nMohon segera tindak lanjuti via Sistem MOM.`;
                                            const waLink = `https://api.whatsapp.com/send?${member?.phone ? `phone=${member.phone}&` : ''}text=${encodeURIComponent(text)}`;
                                            return (
                                                <div key={picName} className="flex flex-col sm:flex-row justify-between sm:items-center bg-white border border-gray-200 p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow gap-3">
                                                    <div>
                                                        <div className="font-bold text-gray-900 text-base">{picName}</div>
                                                        <div className="text-xs text-red-600 font-bold bg-red-50 inline-block px-2 py-1 rounded mt-1 border border-red-100">{tasks.length} Tugas Menunggak</div>
                                                    </div>
                                                    <a href={waLink} target="_blank" className="w-full sm:w-auto bg-green-500 text-white px-5 py-2.5 rounded-lg text-sm font-bold hover:bg-green-600 shadow flex items-center justify-center gap-2 transition-colors"><Icons.MessageCircle size={16}/> Kirim Pesan WA</a>
                                                </div>
                                            );
                                        })}
                                        {allOverdueGrouped.length === 0 && <div className="text-center py-10 text-gray-500 font-bold bg-gray-50 rounded-xl border border-dashed">Semua tugas aman, tidak ada yang overdue.</div>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Follow Up Modal */}
                    {isFollowUpModalOpen && selectedAction && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 print:hidden backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden max-h-[90vh] flex flex-col border border-gray-200">
                                <div className="p-4 sm:p-5 border-b bg-gray-50 flex justify-between items-center">
                                    <h3 className="font-bold text-lg text-gray-900">Update Progress</h3>
                                    <button onClick={() => setIsFollowUpModalOpen(false)} className="text-gray-400 hover:text-red-500 transition-colors bg-gray-200 hover:bg-red-50 p-1.5 rounded-lg"><Icons.X size={18}/></button>
                                </div>
                                <div className="p-5 sm:p-6 overflow-y-auto custom-scrollbar">
                                    <div className="bg-blue-50 p-4 rounded-xl text-sm text-blue-900 border border-blue-200 mb-6 shadow-inner">
                                        <span className="font-bold block mb-1 text-blue-950">Topik Pembahasan:</span>
                                        <p className="leading-relaxed">{selectedAction.topic}</p>
                                    </div>
                                    <div className="mb-6">
                                        <label className="block text-sm font-bold mb-2.5 text-gray-700">1. Ubah Status Penyelesaian</label>
                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-2 sm:gap-3">
                                            <button onClick={() => setSelectedAction({...selectedAction, status: '1'})} className={`py-3 rounded-lg text-sm font-bold border-2 transition-all ${selectedAction.status === '1' ? 'bg-red-100 border-red-500 text-red-700 shadow-sm' : 'bg-white border-gray-200 text-gray-500 hover:bg-gray-50'}`}>Belum</button>
                                            <button onClick={() => setSelectedAction({...selectedAction, status: '2'})} className={`py-3 rounded-lg text-sm font-bold border-2 transition-all ${selectedAction.status === '2' ? 'bg-yellow-100 border-yellow-500 text-yellow-700 shadow-sm' : 'bg-white border-gray-200 text-gray-500 hover:bg-gray-50'}`}>Progress</button>
                                            <button onClick={() => setSelectedAction({...selectedAction, status: '3'})} className={`py-3 rounded-lg text-sm font-bold border-2 transition-all ${selectedAction.status === '3' ? 'bg-green-100 border-green-500 text-green-700 shadow-sm' : 'bg-white border-gray-200 text-gray-500 hover:bg-gray-50'}`}>Selesai</button>
                                        </div>
                                    </div>
                                    <div className="mb-6">
                                        <label className="block text-sm font-bold mb-2.5 text-gray-700 flex justify-between items-center">
                                            <span>2. Lampirkan Bukti (Drive)</span>
                                            {selectedAction.proofFileUrl && <button onClick={() => setSelectedAction({...selectedAction, proofFileUrl: null, proofFileName: null})} className="text-red-500 text-xs font-bold bg-red-50 px-2 py-1 rounded hover:bg-red-100 transition-colors">Hapus Lampiran</button>}
                                        </label>
                                        
                                        {isFileUploading ? (
                                            <div className="flex flex-col items-center justify-center gap-3 bg-blue-50 text-blue-600 px-4 py-8 rounded-xl border-2 border-dashed border-blue-300 font-bold">
                                                <Icons.RefreshCw className="animate-spin" size={24} />
                                                <span>Mengunggah ke Drive...</span>
                                            </div>
                                        ) : (!selectedAction.proofFileUrl && !selectedAction.proofImageBase64) ? (
                                            <label className="flex flex-col items-center justify-center gap-3 bg-gray-50 hover:bg-blue-50 text-gray-500 hover:text-blue-600 px-4 py-8 rounded-xl border-2 border-dashed border-gray-300 hover:border-blue-300 cursor-pointer text-sm font-bold transition-all shadow-sm">
                                                <div className="bg-white p-3 rounded-full shadow-sm"><Icons.Upload size={24} /></div>
                                                <span>Sentuh di sini untuk Upload Foto/Dokumen</span>
                                                <input type="file" accept="*/*" onChange={handleFileUploadToDrive} className="hidden" />
                                            </label>
                                        ) : (
                                            <div className="border-2 border-green-200 p-4 rounded-xl bg-green-50 flex items-center gap-3 shadow-inner">
                                                <div className="bg-green-100 p-3 rounded-full text-green-600"><Icons.FileText size={20}/></div>
                                                <div className="flex-1 overflow-hidden">
                                                    <p className="font-bold text-green-800 text-sm truncate">{selectedAction.proofFileName || 'File Bukti Terlampir'}</p>
                                                    <a href={selectedAction.proofFileUrl || selectedAction.proofImageBase64} target="_blank" className="text-xs text-blue-600 hover:underline">Buka File</a>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <div className="mb-8">
                                        <label className="block text-sm font-bold mb-2 text-gray-700">3. Catatan Progress</label>
                                        <textarea value={selectedAction.proofNote || ''} onChange={(e) => setSelectedAction({...selectedAction, proofNote: e.target.value})} className="w-full border-2 border-gray-300 rounded-xl p-3.5 text-sm h-24 outline-none focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm" placeholder="Ketik keterangan atau kendala di lapangan..."/>
                                    </div>
                                    <button onClick={saveFollowUp} disabled={isFileUploading} className={`w-full text-white font-bold py-4 rounded-xl shadow-lg transition-colors flex items-center justify-center gap-2 text-base ${isFileUploading ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                        <Icons.Save size={18} />Simpan Perubahan Progress
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
